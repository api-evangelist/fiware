        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateentityattrs
        method: PATCH
        description: Update existing Entity attributes within an NGSI-LD system
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entities-entityid-attrs-attrid
