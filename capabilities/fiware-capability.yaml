          be retrieved by using query parameters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removeentitybyid
        method: DELETE
        description: Removes an specific Entity from an NGSI-LD system
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
