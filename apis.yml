aid: fiware
name: FIWARE
description: FIWARE is an open-source framework that provides a curated set of standards and components for context information
  management. The cornerstone is the NGSI-LD API standardized by ETSI ISG CIM, which allows applications to provide, consume,
  and subscribe to context information in smart cities, smart industry, smart agriculture, and smart energy scenarios.
