apis:
- aid: fiware:ngsi-ld
  name: FIWARE NGSI-LD API
  description: The NGSI-LD API defined by ETSI ISG CIM is a Cross-domain Context Information Management API that allows applications
    to provide, consume, and subscribe to context information in multiple scenarios and involving multiple stakeholders. It
    is the linked-data evolution of the NGSI specification and forms the foundation of FIWARE-based smart solutions.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
