- aid: fiware:ngsi-v2
  name: FIWARE NGSI v2 API
  description: The NGSI v2 API is the previous generation context broker specification that established the patterns later
    evolved into NGSI-LD. It is widely implemented by Orion Context Broker and is still in use across many FIWARE-based deployments
    for managing entities, attributes, and subscriptions.
