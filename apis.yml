aid: fiware
name: FIWARE
description: >-
  FIWARE is an open-source framework that provides a curated set of standards
  and components for context information management. The cornerstone is the
  NGSI-LD API standardized by ETSI ISG CIM, which allows applications to
  provide, consume, and subscribe to context information in smart cities,
  smart industry, smart agriculture, and smart energy scenarios.
type: Standard
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
created: '2024-07-02'
modified: '2026-04-28'
position: Consumer
tags:
  - Context Information
  - Devices
  - Internet of Things
  - Linked Data
  - NGSI
  - Smart Cities
  - Standards
url: >-
